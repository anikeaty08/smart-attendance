name: Android CI

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Unit tests, lint (dev), assemble dev debug
        run: chmod +x ./gradlew && ./gradlew :app:testDevDebugUnitTest :app:lintDevDebug :app:assembleDevDebug --no-daemon
